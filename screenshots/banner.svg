<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer border -->
  <rect x="20" y="20" width="640" height="240" rx="16" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Legend -->
  <rect x="40" y="36" width="10" height="10" rx="2" fill="#E24B4A" opacity="0.8"/>
  <text x="56" y="46" font-family="sans-serif" font-size="11" fill="#666" dominant-baseline="central">Vulnerable component</text>
  <rect x="210" y="36" width="10" height="10" rx="2" fill="#BA7517" opacity="0.8"/>
  <text x="226" y="46" font-family="sans-serif" font-size="11" fill="#666" dominant-baseline="central">Misconfigured</text>
  <rect x="340" y="36" width="10" height="10" rx="2" fill="#534AB7" opacity="0.8"/>
  <text x="356" y="46" font-family="sans-serif" font-size="11" fill="#666" dominant-baseline="central">AI model</text>

  <!-- Exploit arc label -->
  <path d="M85 100 Q340 28 500 100" fill="none" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="295" y="58" font-family="sans-serif" font-size="11" fill="#E24B4A" text-anchor="middle" opacity="0.9">Instruction override — credential exfiltration</text>

  <!-- Attacker box -->
  <rect x="40" y="100" width="90" height="80" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="85" y="133" font-family="sans-serif" font-size="13" font-weight="500" fill="#A32D2D" text-anchor="middle" dominant-baseline="central">Attacker</text>
  <text x="85" y="153" font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" dominant-baseline="central">Prompt injection</text>

  <!-- Arrow: attacker -> API -->
  <line x1="130" y1="140" x2="168" y2="140" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- API Gateway box -->
  <rect x="170" y="100" width="100" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="220" y="133" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">API Gateway</text>
  <text x="220" y="153" font-family="sans-serif" font-size="11" fill="#854F0B" text-anchor="middle" dominant-baseline="central">No auth</text>

  <!-- Arrow: API -> Lambda -->
  <line x1="270" y1="140" x2="308" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Lambda box -->
  <rect x="310" y="100" width="100" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="360" y="133" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">Lambda</text>
  <text x="360" y="153" font-family="sans-serif" font-size="11" fill="#854F0B" text-anchor="middle" dominant-baseline="central">Wildcard IAM</text>

  <!-- Arrow: Lambda -> Bedrock -->
  <line x1="410" y1="140" x2="448" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Bedrock box -->
  <rect x="450" y="100" width="100" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="500" y="133" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C" text-anchor="middle" dominant-baseline="central">Bedrock</text>
  <text x="500" y="153" font-family="sans-serif" font-size="11" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Claude / Titan</text>

  <!-- Arrow: Lambda down to DynamoDB -->
  <line x1="360" y1="180" x2="360" y2="215" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- DynamoDB box -->
  <rect x="290" y="217" width="140" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="360" y="234" font-family="sans-serif" font-size="13" font-weight="500" fill="#A32D2D" text-anchor="middle" dominant-baseline="central">DynamoDB</text>
  <text x="360" y="251" font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" dominant-baseline="central">Unencrypted — sensitive data</text>

  <!-- After shield hint -->
  <rect x="584" y="108" width="58" height="64" rx="8" fill="none" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="613" y="130" font-family="sans-serif" font-size="11" fill="#999" text-anchor="middle">After</text>
  <text x="613" y="158" font-family="sans-serif" font-size="24" text-anchor="middle">🛡️</text>
</svg>
